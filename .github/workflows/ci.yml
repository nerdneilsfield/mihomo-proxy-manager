name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventional:
    name: Conventional Commit
    runs-on: ubuntu-latest
    steps:
      - name: Check conventional format
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          pattern = re.compile(
              r"^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)"
              r"(\([A-Za-z0-9._/-]+\))?!?: .+"
          )
          event_name = os.environ["EVENT_NAME"]
          if event_name == "pull_request":
              subject = os.environ.get("PR_TITLE", "").strip()
              label = "pull request title"
          else:
              subject = os.environ.get("HEAD_COMMIT_MESSAGE", "").splitlines()[0].strip()
              label = "head commit subject"

          if not pattern.fullmatch(subject):
              print(f"Invalid conventional commit format in {label}: {subject!r}", file=sys.stderr)
              print(
                  "Expected: type(optional-scope): description, e.g. "
                  "'fix(cache): prevent stale reads'",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"Conventional format OK: {subject}")
          PY

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e . --no-deps

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m ty check

      - name: Test
        run: python -m pytest -q
