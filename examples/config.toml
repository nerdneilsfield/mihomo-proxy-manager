# Example configuration for mihomo-proxy-manager.
#
# Copy this file and replace all example URLs, tokens, and route paths before
# using it in production.

[server]
host = "127.0.0.1"
port = 8080
timezone = "Asia/Shanghai"
health_path = "/healthz"
status_path = "/s/X6HfeBRQz6xqk9S4dTV7gQwL2nP8aYcM"
route_refresh_wait = "10s"
public_base_url = "https://mpm.example.com"

[cache]
dir = "data/cache"
write_indent = 2
file_mode = "0600"
max_stale = "7d"

[logging.console]
enabled = true
level = "INFO"
colorize = true

[logging.file]
enabled = true
path = "logs/mihomo-proxy-manager.log"
level = "DEBUG"
rotation = "10 MB"
retention = "14 days"
compression = "gz"

[http]
timeout = "30s"
user_agent = "mihomo/1.19.5"
max_response_size = "10 MB"
max_redirects = 3

[scheduler]
startup_refresh = true
startup_refresh_mode = "background"
jitter = "30s"
refresh_lock_timeout = "35s"

[security]
hidden_path_min_entropy_bits = 128
allow_private_network_urls = false

[parser]
default_format = "auto"
default_parse_error = "skip"

[output]
yaml_sort_keys = false
default_include_meta_comments = false

# Global DNS defaults. Per-source [sources.<name>.dns] can override these.
# DNS resolution is opt-in; sources are not resolved unless they set enabled = true.
# Servers support udp://, tcp://, https:// (DoH), and tls:// (DoT) schemes.
# Servers are tried in order; on failure the next is used.
# enable_ipv6 defaults to false (A records only). Set to true to also query AAAA.
[dns]
servers = [
    "udp://1.1.1.1:53",
    "tls://1.1.1.1:853?servername=cloudflare-dns.com",
    "https://dns.google/dns-query",
]
timeout = "5s"
failure = "keep"
enable_ipv6 = false

# Source A: authenticated upstream subscription.
[sources.airport_a]
url = "https://example.com/sub"
format = "auto"
parse_error = "skip"

[sources.airport_a.fetch]
timeout = "30s"
user_agent = "mihomo/1.19.5"

[sources.airport_a.fetch.headers]
Authorization = "Bearer replace-me"

[sources.airport_a.refresh]
interval = "1h"
cron = ["0 4 * * *"]

[sources.airport_a.rename]
prefix = "[{source}] "

[sources.airport_a.filter]
include = "香港|日本|HK|JP"
exclude = "官网|剩余|过期|套餐"
exclude_types = ["http"]

[sources.airport_a.plugins.before_fetch.turn_on_airport]
on_failure = "abort"

# Optional: resolve node hostnames to IP at refresh time.
# When enabled, the source skips ETag/Last-Modified conditional requests.
# [sources.airport_a.dns]
# enabled = true
# servers = ["https://dns.google/dns-query"]
# failure = "keep"  # keep | drop | fail

# Source B: plain upstream subscription with a different region policy.
[sources.airport_b]
url = "https://example.net/sub"
format = "auto"
parse_error = "skip"

[sources.airport_b.refresh]
interval = "2h"

[sources.airport_b.rename]
prefix = "[{source}] "

[sources.airport_b.filter]
include = "新加坡|美国|SG|US"
include_types = ["ss", "vmess", "vless", "trojan", "hysteria2"]

# HTTP Action plugin used before refreshing source A.
[plugins.turn_on_airport]
type = "http_action"
method = "POST"
url = "https://example.com/api/switch"
success_status = [200, 204]
timeout = "10s"
body = "{\"enabled\":true}"

[plugins.turn_on_airport.headers]
Authorization = "Bearer replace-me"
Content-Type = "application/json"

# Route for a phone: use both sources, return what is available.
[routes.phone]
path = "/p/CsYWr0BGzGQQmwq2X5eG5Qn8Kp4zR7vL.yaml"
sources = ["airport_a", "airport_b"]
require_all_sources = false

[routes.phone.output]
format = "provider"
include_meta_comments = false

[routes.phone.rename]
prefix = "[phone] "

[routes.phone.filter]
exclude = "倍率|测试|Traffic"

# Restrict this route to known proxy clients by User-Agent.
# Patterns use shell-style glob (fnmatch), case-sensitive.
# Empty list or omitted = open to all.
[routes.phone.access]
user_agent = ["mihomo/*", "clash-meta/*", "clash.meta/*"]

# Route for a gateway: require every source and keep only selected regions.
[routes.gateway]
path = "/p/Pd6MZ8vQpWv42xZ9HTmKc7YbNf3aLsGj.yaml"
sources = ["airport_a", "airport_b"]
require_all_sources = true

[routes.gateway.output]
format = "provider"
include_meta_comments = true

[routes.gateway.rename]
prefix = "[gateway] "

[routes.gateway.filter]
include = "香港|日本|新加坡|HK|JP|SG"
exclude_types = ["http"]

# One auto route for multiple clients. Query target, companion suffix, and
# User-Agent decide the effective output; fixed routes below remain explicit.
[routes.auto]
path = "/p/auto-CsYWr0BGzGQQmwq2X5eG5Qn8Kp4zR7vL"
sources = ["airport_a", "airport_b"]
require_all_sources = false

[routes.auto.output]
format = "auto"
auto_default = "provider"
import_link = true
resource_tag = "MPM Auto"
encoding = "base64"

# Direct subscription for v2rayN/Xray-compatible clients.
# Default encoding is base64; set encoding = "plain" for debugging.
[routes.v2rayn]
path = "/p/V2RayN7vQpWv42xZ9HTmKc7YbNf3aLsGj.yaml"
sources = ["airport_a", "airport_b"]
require_all_sources = false

[routes.v2rayn.output]
format = "xray-uri"
encoding = "base64"

# Direct import for Quantumult X.
# Main route returns server lines; "-import" opens the one-click import URL.
[routes.qx]
path = "/p/QX7MZ8vQpWv42xZ9HTmKc7YbNf3aLsGj.yaml"
sources = ["airport_a", "airport_b"]
require_all_sources = false

[routes.qx.output]
format = "quantumult-x"
resource_tag = "MPM"
import_link = true
import_response = "redirect"
import_target = "app-scheme"

# Direct import for Surfboard.
# Main route returns a minimal full profile; "-nodes" returns proxy lines for policy-path.
[routes.surfboard]
path = "/p/SurfBd7vQpWv42xZ9HTmKc7YbNf3aLsGj.yaml"
sources = ["airport_a", "airport_b"]
require_all_sources = false

[routes.surfboard.output]
format = "surfboard"
test_url = "http://www.gstatic.com/generate_204"
test_interval = 600
test_timeout = 5
test_tolerance = 100
